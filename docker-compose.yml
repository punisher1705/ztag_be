services:
  gateway:
    build:
      context: .
      dockerfile: docker/gateway/Dockerfile
    container_name: gateway
    ports:
      - "5001:5001"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app 
    networks:
      - gateway-net
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-me-root}
      MYSQL_DATABASE: ${DB_NAME:-gateway_db}
      MYSQL_USER: ${DB_USER:-gateway_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-change-me-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gateway-net
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - gateway-net
    restart: unless-stopped
    # First run: `make ollama-pull` to download the model into this volume.

networks:
  gateway-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  ollama-data: